name: Deploy to Hostinger

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  NODE_VERSION: "20"

jobs:
  build-and-deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build Next.js static export
        working-directory: frontend
        run: npm run build

      - name: Upload backend via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          port: ${{ secrets.SSH_PORT }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          source: "backend/"
          target: "/home/${{ secrets.SSH_USERNAME }}/domains/simonik.yapinet.id/app"
          overwrite: true

      - name: Upload frontend static files via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          port: ${{ secrets.SSH_PORT }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          source: "frontend/out/"
          target: "/home/${{ secrets.SSH_USERNAME }}/domains/simonik.yapinet.id/public_html"
          strip_components: 2
          overwrite: true

      - name: Upload deploy files
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          port: ${{ secrets.SSH_PORT }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          source: "deploy/"
          target: "/home/${{ secrets.SSH_USERNAME }}/domains/simonik.yapinet.id"
          overwrite: true

      - name: Setup backend & finalize deployment
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          port: ${{ secrets.SSH_PORT }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          envs: DB_PASSWORD
          script: |
            set -e

            APP_DIR="$HOME/domains/simonik.yapinet.id/app/backend"
            PUBLIC_DIR="$HOME/domains/simonik.yapinet.id/public_html"

            # ---- Backend Setup ----
            cd "$APP_DIR"

            # Install Composer dependencies
            composer install --no-dev --optimize-autoloader --no-interaction 2>&1

            # Setup .env on first deploy
            if [ ! -f .env ]; then
              DEPLOY_DIR="$HOME/domains/simonik.yapinet.id/deploy"
              if [ -f "$DEPLOY_DIR/.env.production" ]; then
                cp "$DEPLOY_DIR/.env.production" .env
              else
                cp .env.example .env
              fi
              # Set database password from secret
              sed -i "s/\"\${DB_PASSWORD}\"/$DB_PASSWORD/g" .env
              php artisan key:generate --force
              echo "==> First deploy: .env created. Review and adjust if needed."
            fi

            # Run database migrations
            php artisan migrate --force 2>&1

            # Optimize for production
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache

            # ---- Public HTML Setup ----
            DEPLOY_DIR="$HOME/domains/simonik.yapinet.id/deploy"

            # Copy htaccess and index.php to public_html
            cp -f "$DEPLOY_DIR/htaccess" "$PUBLIC_DIR/.htaccess"
            cp -f "$DEPLOY_DIR/index.php" "$PUBLIC_DIR/index.php"

            # Create storage symlink
            ln -sfn "$APP_DIR/storage/app/public" "$PUBLIC_DIR/storage"

            echo "==> Deployment complete! https://simonik.yapinet.id"
        env:
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
