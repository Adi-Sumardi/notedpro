name: Deploy to Hostinger

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  NODE_VERSION: "20"

jobs:
  build-and-deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build Next.js static export
        working-directory: frontend
        run: npm run build

      # ── Verify SSH connectivity before SCP ───────────────────────────────────
      - name: Wait for SSH to be reachable
        timeout-minutes: 3
        run: |
          for i in $(seq 1 12); do
            if nc -zw 10 ${{ secrets.SSH_HOST }} ${{ secrets.SSH_PORT }} 2>/dev/null; then
              echo "SSH port reachable on attempt $i"
              exit 0
            fi
            echo "Attempt $i: not reachable, retrying in 15s..."
            sleep 15
          done
          echo "SSH port unreachable after 3 minutes — check server firewall"
          exit 1

      # ── SCP: backend ─────────────────────────────────────────────────────────
      - name: Upload backend via SCP (attempt 1)
        id: scp_backend_1
        timeout-minutes: 5
        continue-on-error: true
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          port: ${{ secrets.SSH_PORT }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          source: "backend/"
          target: "/home/${{ secrets.SSH_USERNAME }}/domains/simonik.yapinet.id/app"
          overwrite: true
          timeout: 120s
          command_timeout: 8m

      - name: Upload backend via SCP (retry)
        if: steps.scp_backend_1.outcome == 'failure'
        timeout-minutes: 5
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          port: ${{ secrets.SSH_PORT }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          source: "backend/"
          target: "/home/${{ secrets.SSH_USERNAME }}/domains/simonik.yapinet.id/app"
          overwrite: true
          timeout: 120s
          command_timeout: 8m

      # ── Clear stale frontend chunks ───────────────────────────────────────────
      - name: Clear stale frontend chunks on server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          port: ${{ secrets.SSH_PORT }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          timeout: 120s
          script: |
            rm -rf $HOME/domains/simonik.yapinet.id/public_html/_next

      # ── SCP: frontend ─────────────────────────────────────────────────────────
      - name: Upload frontend static files via SCP (attempt 1)
        id: scp_frontend_1
        timeout-minutes: 5
        continue-on-error: true
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          port: ${{ secrets.SSH_PORT }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          source: "frontend/out/"
          target: "/home/${{ secrets.SSH_USERNAME }}/domains/simonik.yapinet.id/public_html"
          strip_components: 2
          overwrite: true
          timeout: 120s
          command_timeout: 8m

      - name: Upload frontend static files via SCP (retry)
        if: steps.scp_frontend_1.outcome == 'failure'
        timeout-minutes: 5
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          port: ${{ secrets.SSH_PORT }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          source: "frontend/out/"
          target: "/home/${{ secrets.SSH_USERNAME }}/domains/simonik.yapinet.id/public_html"
          strip_components: 2
          overwrite: true
          timeout: 120s
          command_timeout: 8m

      # ── SCP: deploy config ────────────────────────────────────────────────────
      - name: Upload deploy files via SCP (attempt 1)
        id: scp_deploy_1
        timeout-minutes: 3
        continue-on-error: true
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          port: ${{ secrets.SSH_PORT }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          source: "deploy/"
          target: "/home/${{ secrets.SSH_USERNAME }}/domains/simonik.yapinet.id"
          overwrite: true
          timeout: 120s
          command_timeout: 3m

      - name: Upload deploy files via SCP (retry)
        if: steps.scp_deploy_1.outcome == 'failure'
        timeout-minutes: 3
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          port: ${{ secrets.SSH_PORT }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          source: "deploy/"
          target: "/home/${{ secrets.SSH_USERNAME }}/domains/simonik.yapinet.id"
          overwrite: true
          timeout: 120s
          command_timeout: 3m

      # ── SSH: finalize ─────────────────────────────────────────────────────────
      - name: Setup backend & finalize deployment
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          port: ${{ secrets.SSH_PORT }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          timeout: 120s
          command_timeout: 15m
          envs: DB_DATABASE,DB_USERNAME,DB_PASSWORD,MAIL_HOST,MAIL_PORT,MAIL_USERNAME,MAIL_PASSWORD,WATZAP_API_KEY,WATZAP_NUMBER_KEY
          script: |
            set -e

            APP_DIR="$HOME/domains/simonik.yapinet.id/app/backend"
            PUBLIC_DIR="$HOME/domains/simonik.yapinet.id/public_html"
            DEPLOY_DIR="$HOME/domains/simonik.yapinet.id/deploy"

            # ---- Backend Setup ----
            cd "$APP_DIR"

            # Install Composer dependencies
            composer install --no-dev --optimize-autoloader --no-interaction 2>&1

            # Setup .env from template (always update from latest template)
            if [ -f "$DEPLOY_DIR/.env.production" ]; then
              # Preserve existing APP_KEY if .env already exists
              EXISTING_KEY=""
              if [ -f .env ]; then
                EXISTING_KEY=$(grep "^APP_KEY=" .env | cut -d'=' -f2-)
              fi

              cp "$DEPLOY_DIR/.env.production" .env

              # Replace all secret placeholders
              sed -i "s|\"\${DB_DATABASE}\"|$DB_DATABASE|g" .env
              sed -i "s|\"\${DB_USERNAME}\"|$DB_USERNAME|g" .env
              sed -i "s|\"\${DB_PASSWORD}\"|$DB_PASSWORD|g" .env
              sed -i "s|\"\${MAIL_HOST}\"|$MAIL_HOST|g" .env
              sed -i "s|\"\${MAIL_PORT}\"|$MAIL_PORT|g" .env
              sed -i "s|\"\${MAIL_USERNAME}\"|$MAIL_USERNAME|g" .env
              sed -i "s|\"\${MAIL_PASSWORD}\"|$MAIL_PASSWORD|g" .env
              sed -i "s|\"\${WATZAP_API_KEY}\"|$WATZAP_API_KEY|g" .env
              sed -i "s|\"\${WATZAP_NUMBER_KEY}\"|$WATZAP_NUMBER_KEY|g" .env

              # Restore or generate APP_KEY
              if [ -n "$EXISTING_KEY" ]; then
                sed -i "s|^APP_KEY=.*|APP_KEY=$EXISTING_KEY|" .env
              else
                php artisan key:generate --force
              fi
            fi

            # Run database migrations
            php artisan migrate --force 2>&1

            # Sync roles & permissions (idempotent)
            php artisan db:seed --class=RolePermissionSeeder --force 2>&1

            # Optimize for production
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache

            # ---- Public HTML Setup ----
            # Copy htaccess and laravel.php to public_html
            cp -f "$DEPLOY_DIR/htaccess" "$PUBLIC_DIR/.htaccess"
            cp -f "$DEPLOY_DIR/laravel.php" "$PUBLIC_DIR/laravel.php"

            # Remove old index.php if exists (from previous deploy)
            rm -f "$PUBLIC_DIR/index.php"

            # Create storage symlink
            ln -sfn "$APP_DIR/storage/app/public" "$PUBLIC_DIR/storage"

            echo "==> Deployment complete! https://simonik.yapinet.id"
        env:
          DB_DATABASE: ${{ secrets.DB_DATABASE }}
          DB_USERNAME: ${{ secrets.DB_USERNAME }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          MAIL_HOST: ${{ secrets.MAIL_HOST }}
          MAIL_PORT: ${{ secrets.MAIL_PORT }}
          MAIL_USERNAME: ${{ secrets.MAIL_USERNAME }}
          MAIL_PASSWORD: ${{ secrets.MAIL_PASSWORD }}
          WATZAP_API_KEY: ${{ secrets.WATZAP_API_KEY }}
          WATZAP_NUMBER_KEY: ${{ secrets.WATZAP_NUMBER_KEY }}
